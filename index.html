<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finty - Tu plata, tus reglas</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="icono.png" type="image/png">
  <link rel="manifest" href="manifest.json?v=2">
  <meta name="theme-color" content="#0b1120"> 
</head>
<body class="premium-landing">
  
  <div class="landing-content">
      <h1>Finty</h1>
      <h2>Tu plata, tus reglas.</h2>
      
      <p>Olvidate de llegar a fin de mes preguntándote<br>en qué se te fue el sueldo. Anotá tus gastos en<br>dos toques y tomá el control.</p>
    
      <div class="acciones">
          <a href="login.html" class="btn-principal">Iniciar Sesión</a>
          <a href="registro.html" class="btn-secundario-new">Crear Cuenta</a>
      </div>
  </div>

  <div class="app-previews-container">
      
      <div class="app-preview-card left-card">
          <div class="mockup-bar">
              <div class="mac-dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
              <div class="mockup-title">Gastos</div>
          </div>
          <img src="app-preview-gastos.png" alt="Vista previa Gastos">
      </div>

      <div class="app-preview-card center-card">
          <div class="mockup-bar">
              <div class="mac-dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
              <div class="mockup-title" style="color: #2ac9bb;">Inicio</div>
          </div>
          <img src="app-preview-inicio.png" alt="Vista previa Inicio">
      </div>

      <div class="app-preview-card right-card">
          <div class="mockup-bar">
              <div class="mac-dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
              <div class="mockup-title">Tarjetas</div>
          </div>
          <img src="app-preview-tarjetas.png" alt="Vista previa Tarjetas">
      </div>

  </div>

</body>
</html>
