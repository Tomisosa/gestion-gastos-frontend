<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finty - Tu plata, tus reglas</title>
  <link rel="stylesheet" href="css/styles.css">
  
  <link rel="icon" href="finty-logo.png" type="image/png">
  <link rel="apple-touch-icon" href="finty-logo.png">
  
  <link rel="manifest" href="manifest.json?v=2">
  <meta name="theme-color" content="#0b1120"> 
</head>
<body class="inicio premium-landing">
  <div class="hero-container">
    
    <div style="display: flex; justify-content: center; margin-bottom: 40px; transform: scale(1.6);">
        <div class="finty-logo-container">
            <div class="finty-dot"></div>
            <span class="finty-f">F</span>
        </div>
    </div>

    <header>
        <h1 style="font-size: 3.5rem; color: #ffffff; margin: 0 0 5px 0; font-weight: 800; letter-spacing: -1px;">Finty</h1>
        <h2 style="color: var(--color-primario); font-size: 1.3rem; font-weight: 600; margin-top: 0; margin-bottom: 25px;">Tu plata, tus reglas.</h2>
    </header>

    <main>
        <p style="color: #cbd5e1; font-size: 1.1rem; line-height: 1.6; margin-bottom: 40px; padding: 0 10px;">
            Olvidate de llegar a fin de mes preguntándote en qué se te fue el sueldo. Anotá tus gastos en dos toques y tomá el control.
        </p>
      
      <div class="acciones">
        <a href="login.html" class="btn-principal" style="box-shadow: 0 8px 25px rgba(42, 201, 187, 0.3);">Iniciar Sesión</a>
        <a href="registro.html" class="btn-secundario-new">Crear Cuenta</a>
      </div>
    </main>

	<div class="app-previews-container">
	        
	        <div class="app-preview-card left-card">
	            <div class="mockup-bar">
	                <div class="mac-dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
	                <div class="mockup-title">Gastos</div>
	            </div>
	            <img src="app-preview-gastos.png" alt="Vista previa de Gastos Finty">
	        </div>

	        <div class="app-preview-card center-card">
	            <div class="mockup-bar">
	                <div class="mac-dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
	                <div class="mockup-title" style="color: #2ac9bb;">Inicio</div>
	            </div>
	            <img src="app-preview-inicio.png" alt="Vista previa de Inicio Finty">
	        </div>

	        <div class="app-preview-card right-card">
	            <div class="mockup-bar">
	                <div class="mac-dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
	                <div class="mockup-title">Tarjetas</div>
	            </div>
	            <img src="app-preview-tarjetas.png" alt="Vista previa de Tarjetas Finty">
	        </div>
	        
	    </div>
    
  </div> </body>
</html>
