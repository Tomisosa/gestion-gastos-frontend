<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finty - Cargando...</title>
  
  <style>
    /* Fondo Azul Noche Profundo Profundo Profundo Profundo Profundo */
    body.splash-page {
      background-color: #0b1120; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* Contenedor central de la animación */
    .animacion-centro {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 150px;
      height: 150px;
    }

    /* Ondas expansivas (Efecto latido/sonar que querías) */
    .onda {
      position: absolute;
      width: 60px;
      height: 60px;
      background-color: #2ac9bb;
      border-radius: 50%;
      opacity: 0;
      animation: expandirOnda 2s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
    }

    /* La segunda onda arranca un poquito después para hacer el efecto doble */
    .onda:nth-child(2) {
      animation-delay: 0.6s;
    }

    /* NUEVO LOGO GEOMÉTRICO FINTY (ANIMADO) */
    /* Reemplazamos la F vieja por este ícono complejo intrincado */
    .finty-logo-splash {
      position: relative;
      z-index: 10;
      width: 80px; /* Tamaño grande para que sea el rey */
      height: 80px;
      opacity: 0;
      /* Animación que lo hace aparecer, flotar y escalar un poquito */
      animation: aparecerLogoComplex 1.5s ease-out forwards, floatLogo 4s ease-in-out infinite;
      transform-origin: center;
      /* Brillo cian espectacular */
      filter: drop-shadow(0 0 15px rgba(42, 201, 187, 0.8)); 
    }

    /* El texto de bienvenida que sube suavemente */
    .texto-bienvenida {
      margin-top: 30px;
      color: #2ac9bb;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 2px;
      opacity: 0;
      animation: subirTexto 1s ease-out 1s forwards; /* Empieza después del logo */
    }

    /* --- LAS ANIMACIONES --- */
    
    /* Efecto de resplandor expansivo */
    @keyframes expandirOnda {
      0% {
        transform: scale(0.5);
        opacity: 0.8;
      }
      100% {
        transform: scale(3.5);
        opacity: 0;
      }
    }

    /* Animación de aparición para el logo geométrico complejo */
    @keyframes aparecerLogoComplex {
      0% {
        opacity: 0;
        transform: scale(0.2) rotate(-20deg);
      }
      100% {
        opacity: 1;
        transform: scale(1.6) rotate(0deg); /* Central y un 60% más grande */
      }
    }

    /* Flotado suave del logo */
    @keyframes floatLogo {
      0%, 100% { transform: translateY(0) scale(1.6); }
      50% { transform: translateY(-5px) scale(1.6); }
    }

    /* Entrada suave del texto */
    @keyframes subirTexto {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body class="splash-page">

  <div class="animacion-centro">
    <div class="onda"></div>
    <div class="onda"></div>
    
    <svg class="finty-logo-splash" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#2ac9bb" stroke-width="2"/>
      <circle cx="50" cy="50" r="5" fill="#2ac9bb"/>
      <path d="M50 5 L50 95 M5 50 L95 50 M18 18 L82 82 M18 82 L82 18" fill="none" stroke="#2ac9bb" stroke-width="2"/>
      <circle cx="50" cy="12" r="3" fill="#2ac9bb"/>
      <circle cx="50" cy="88" r="3" fill="#2ac9bb"/>
      <circle cx="12" cy="50" r="3" fill="#2ac9bb"/>
      <circle cx="88" cy="50" r="3" fill="#2ac9bb"/>
      <circle cx="23" cy="23" r="3" fill="#2ac9bb"/>
      <circle cx="77" cy="77" r="3" fill="#2ac9bb"/>
      <circle cx="23" cy="77" r="3" fill="#2ac9bb"/>
      <circle cx="77" cy="23" r="3" fill="#2ac9bb"/>
    </svg>
  </div>

  <div class="texto-bienvenida">F I N T Y</div>

  <script>
    setTimeout(() => {
      // Nos vamos al inicio con una transición suave
      document.body.style.transition = "opacity 0.5s ease";
      document.body.style.opacity = "0";
      
      setTimeout(() => {
          window.location.href = "index.html"; 
      }, 500); // Espera medio segundo a que se ponga en negro antes de saltar
      
    }, 3000); // A los 3 segundos empieza a irse
  </script>

</body>
</html>
