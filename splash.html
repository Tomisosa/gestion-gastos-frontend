<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finty - Cargando...</title>
  
  <link rel="icon" href="icono.png" type="image/png">
  <link rel="apple-touch-icon" href="icono.png">
  <meta name="theme-color" content="#0b1120">

  <style>
    /* Fondo Azul Noche Profundo */
    body {
      margin: 0;
      padding: 0;
      background-color: #0b1120; 
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Contenedor central donde ocurre la magia */
    .splash-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- ANIMACIÓN DE ONDAS CONCÉNTRICAS --- */
    .onda {
      position: absolute;
      border: 2px solid #2ac9bb; /* Color turquesa de Finty */
      border-radius: 50%;
      opacity: 0;
      /* Animación de 3 segundos infinita */
      animation: expandirRadar 3s cubic-bezier(0.25, 0.8, 0.25, 1) infinite;
    }

    /* Retrasamos cada onda para que salgan una atrás de la otra */
    .onda:nth-child(1) { animation-delay: 0s; }
    .onda:nth-child(2) { animation-delay: 0.6s; }
    .onda:nth-child(3) { animation-delay: 1.2s; }
    .onda:nth-child(4) { animation-delay: 1.8s; }
    .onda:nth-child(5) { animation-delay: 2.4s; }

    @keyframes expandirRadar {
      0% {
        width: 60px;
        height: 60px;
        opacity: 0.8;
        border-width: 4px;
      }
      100% {
        width: 800px; /* Hasta dónde crece la onda */
        height: 800px;
        opacity: 0;
        border-width: 1px;
      }
    }

    /* --- EL LOGO 'F' CENTRAL --- */
    .logo-centro {
      position: relative;
      z-index: 10;
      width: 110px;
      height: 110px;
      /* Brillo neón turquesa alrededor del logo */
      filter: drop-shadow(0 0 15px rgba(42, 201, 187, 0.6));
      /* Hacemos que la F "lata" suavemente al ritmo de las ondas */
      animation: latidoLogo 3s infinite ease-in-out;
    }

    @keyframes latidoLogo {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(42, 201, 187, 0.6)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(42, 201, 187, 0.9)); }
    }
  </style>
</head>
<body>

  <div class="splash-container">
    <div class="onda"></div>
    <div class="onda"></div>
    <div class="onda"></div>
    <div class="onda"></div>
    <div class="onda"></div>

    <svg class="logo-centro" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M30,80 C30,80 25,35 50,20 C65,10 85,15 85,15" stroke="#2ac9bb" stroke-width="8" fill="none" stroke-linecap="round"/>
        <path d="M43,70 C43,70 40,45 55,33 C65,25 77,28 77,28" stroke="#2ac9bb" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M40,55 C50,55 60,50 73,38" stroke="#2ac9bb" stroke-width="8" fill="none" stroke-linecap="round"/>
        <polygon points="67,33 80,30 75,43" fill="#2ac9bb"/>
    </svg>
  </div>

  <script>
    // Redirección automática después de 2.5 segundos
    setTimeout(() => {
      // Efecto de desvanecimiento en negro
      document.body.style.transition = "opacity 0.5s ease";
      document.body.style.opacity = "0";
      
      setTimeout(() => {
          // ACÁ PONÉ LA PÁGINA A LA QUE DEBE IR (ej: index.html o login.html)
          window.location.href = "login.html"; 
      }, 500);
      
    }, 2500); 
  </script>

</body>
</html>
